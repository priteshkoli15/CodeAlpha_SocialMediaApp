<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>User Profile</h1>

<div class="card" id="profile"></div>

</div>

<script>

const user =
    JSON.parse(localStorage.getItem("user"));

document.getElementById("profile").innerHTML = `

    <h2>${user.name}</h2>

    <p>${user.email}</p>

`;

</script>

</body>
</html>
